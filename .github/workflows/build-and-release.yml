name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: false
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  # Re-runs the full make ci gate (test, lint, nilaway, coverage floor,
  # go-crap change-risk gate) at release time rather than trusting main was
  # never rebased/force-pushed since ci.yml last ran on it. Previously this
  # job hand-copied only test+lint+nilaway, so a release could ship with a
  # coverage regression or crap-gate violation that PR-time ci.yml would have
  # caught, if main had drifted since the last PR merge.
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # go-crap-gate diffs changed functions against origin/main

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Install dev tools
        run: make setup

      - name: Run CI gate
        run: make ci

  build:
    needs: ci
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: theia-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: theia-linux-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Get version info
        id: info
        run: |
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build \
            -ldflags="-s -w -X 'github.com/Elysium-Labs-EU/theia/internal/buildinfo.Version=${{ steps.info.outputs.version }}' -X 'github.com/Elysium-Labs-EU/theia/internal/buildinfo.GitCommit=${{ steps.info.outputs.commit }}' -X 'github.com/Elysium-Labs-EU/theia/internal/buildinfo.BuildDate=${{ steps.info.outputs.date }}'" \
            -o ${{ matrix.artifact }} .

      - name: Verify binary
        run: |
          ls -lh ${{ matrix.artifact }}
          file ${{ matrix.artifact }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display downloaded files
        run: |
          echo "=== Artifact structure ==="
          ls -R artifacts/
          find artifacts -type f

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -name "theia-linux-*" -exec cp {} release/ \;
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum theia-linux-* > sha256sums.txt
          cat sha256sums.txt

      - name: Sign checksums
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          cd release
          if [ -z "${RELEASE_SIGNING_KEY:-}" ]; then
            echo "RELEASE_SIGNING_KEY secret is not set — skipping release signing."
            echo "Clients only warn on a missing signature right now (see requireReleaseSignature"
            echo "in cmd/update.go), but that's meant to flip to a hard failure once this secret"
            echo "is provisioned and a signed release has shipped. Provision it before then."
            exit 0
          fi
          key_file=$(mktemp)
          trap 'rm -f "$key_file"' EXIT
          printf '%s\n' "$RELEASE_SIGNING_KEY" > "$key_file"
          openssl dgst -sha256 -sign "$key_file" -out sha256sums.txt.sig sha256sums.txt
          echo "Signed sha256sums.txt -> sha256sums.txt.sig"

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: |
            release/theia-linux-amd64
            release/theia-linux-arm64
            release/sha256sums.txt*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Theia ${{ steps.version.outputs.version }}

            Privacy-first server-side analytics. No client-side JavaScript, no cookies, no third-party tracking.

            ### Quick Installation

            Using curl
            ```bash
            curl -sSL https://raw.githubusercontent.com/Elysium-Labs-EU/theia/main/install.sh -o install.sh
            sudo bash install.sh
            ```

            Using wget
            ```bash
            wget https://raw.githubusercontent.com/Elysium-Labs-EU/theia/main/install.sh
            sudo bash install.sh
            ```

            ### Manual Installation

            Download the appropriate binary for your architecture:
            - **Linux AMD64**: `theia-linux-amd64`
            - **Linux ARM64**: `theia-linux-arm64`

            Then:
            ```bash
            chmod +x theia-linux-amd64  # or theia-linux-arm64
            sudo cp theia-linux-amd64 /usr/local/bin/theia
            ```

            ### Verify Download

            Check the `sha256sums.txt` file and verify:
            ```bash
            sha256sum -c sha256sums.txt
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
